node:
  name: dcloud-node
  identity_path: ./storage/identity
  client_type: pc # pc oder server
storage:
  path: ./storage
  limit_bytes: 53687091200  # 50 GiB freigegebener Speicher, Minimum 5 GiB
  min_free_bytes: 1073741824 # 1 GiB
  chunk_size_bytes: 4194304  # 4 MiB
web:
  host: 0.0.0.0 # für P2P-Chunk/API im LAN erreichbar; lokal weiter über 127.0.0.1 nutzbar
  port: 8787
network:
  udp_host: 0.0.0.0
  udp_port: 6881
  udp_port_range:
    start: 6881
    end: 6891
  bootstrap_nodes: []
  tree_parent_nodes: [] # upstream peers that can relay for this node behind NAT
  relay_children: false # set true on the one LAN node with port forwarding
  discovery_interval_seconds: 10
  auto_discovery_enabled: true
  auto_discovery_ports:
    - 6881 # sichtbare dcloud-Clients im LAN automatisch ansprechen
  auto_discovery_hosts:
    - 255.255.255.255 # LAN-Broadcast; optional um weitere Broadcast-Adressen erweiterbar
  startup_discovery_seconds: 12
  startup_discovery_interval_seconds: 2
  peer_timeout_seconds: 35 # Offline-Peers nach ca. 3 verpassten Discovery-Runden ausblenden
  peer_cleanup_interval_seconds: 5 # alle 5 Sekunden Offline-Peers bereinigen
  relay_url: "https://support.tmp-networks.de/dcstorage/dcloud_relay.php" # festes öffentliches Standard-Relay
  relay_urls:
    - "https://support.tmp-networks.de/dcstorage/dcloud_relay.php" # weitere Relays werden hier ergänzt und im Netzwerk verteilt
  relay_secret: "" # deprecated: Relay-Tages-Token werden automatisch vom PHP-Relay erzeugt
  relay_poll_interval_seconds: 1 # Relay-Mailbox-Long-Polling für entfernte Peers
  relay_request_timeout_seconds: 180 # Timeout für Chunk-/Manifest-Transfers über Relay
  relay_chunk_size_bytes: 524288 # 512 KiB: PHP-Relay-sichere Chunk-Größe gegen post_max_size/JSON-Limits
security:
  protocol_magic: DCLOUD1
smb:
  enabled: false
  host: 0.0.0.0
  port: 445
  share_name: DCLOUD
  username: ""
  password: ""
