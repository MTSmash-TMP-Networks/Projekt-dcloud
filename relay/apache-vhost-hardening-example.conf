# Optional Apache vhost hardening example for the public relay host.
# Adjust paths before using. This is not required by the Python client.

# Block common bot/probe paths before they hit PHP-FPM.
RedirectMatch 404 ^/(server-status|cgi-bin|nagios3|wp-admin|wp-login\.php|vendor|\.env|composer\.(json|lock))

<Directory "/mnt/vmfs/vhosts/support.tmp-networks.de/httpdocs">
    Options -Indexes
    AllowOverride All
    Require all granted
</Directory>

# If dcloud_relay.php is the only file that should be public in /relay:
<Directory "/mnt/vmfs/vhosts/support.tmp-networks.de/httpdocs/relay">
    Options -Indexes
    AllowOverride All
    Require all granted
</Directory>

# Keep PHP upload/body limits below what the relay is willing to read.
# The current relay rejects bodies above 272 MiB before reading php://input.
# Recommended for tracker/signaling usage without PHP data relay:
#   php_admin_value[post_max_size] = 32M
#   php_admin_value[upload_max_filesize] = 32M
#   php_admin_value[memory_limit] = 256M
